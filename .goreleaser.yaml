version: 2

project_name: lasso

before:
  hooks:
    - go mod tidy

builds:
  - id: lasso
    main: ./cmd/lasso
    binary: lasso
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X github.com/dannyaziz/lasso-money/internal/cli.Version={{.Version}}

archives:
  # Version-free names so install.sh can use stable
  # releases/latest/download/ URLs.
  - name_template: "lasso_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
